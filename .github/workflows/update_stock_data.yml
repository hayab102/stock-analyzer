name: "更新: 銘柄リストと株価データ取得"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'

jobs:
  update_stocks:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ライブラリインストール
        run: |
          pip install pandas yfinance openpyxl xlrd requests

      - name: JPX銘柄マスター取得
        run: |
          python get_all_tickers.py
          ls -lh jpx_tickers_full.csv
          wc -l jpx_tickers_full.csv

      - name: 検索用CSV生成
        run: |
          python build_search_catalog.py
          ls -lh search_catalog.csv
          wc -l search_catalog.csv
          head -n 10 search_catalog.csv

      - name: 既存の銘柄一覧CSV生成
        run: |
          python stock_csv_generator.py
          ls -lh ticker_list.csv
          wc -l ticker_list.csv
          head -n 10 ticker_list.csv

      - name: ファイル一覧を表示
        run: |
          ls -lh

      - name: 生成CSVをリポジトリへ反映
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add search_catalog.csv
          git diff --cached --quiet || git commit -m "Update search_catalog.csv"
          git push
